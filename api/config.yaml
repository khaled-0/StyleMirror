server:
  addr: ":8080"
  read_timeout: 60s
  idle_timeout: 120s

database:
  url: "postgres://stylemirror:stylemirror@localhost:5432/stylemirror?sslmode=disable"

dashscope:
  # Override at runtime with DASHSCOPE_API_KEY env var
  api_key: ""
  base_url: "https://dashscope-intl.aliyuncs.com"
  # model: "qwen-image-edit-plus-2025-12-15"
  # model: "qwen-image-edit-plus-2025-10-30"
  model: "qwen-image-edit-plus"
  timeout: 90s

cors:
  allowed_origins:
    - "http://localhost:5173"
    - "http://localhost:4173"
    - "https://stylemirror.localhost"

limits:
  requests_per_hour: 20
  estimated_seconds: 15
  max_upload_bytes: 15728640  # 15 MiB
