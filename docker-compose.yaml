version: "3.9"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://stylemirror:stylemirror@postgres:5432/stylemirror?sslmode=disable"
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      DASHSCOPE_MODEL: ${DASHSCOPE_MODEL:-qwen-image-edit-plus-2025-12-15}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stylemirror
      POSTGRES_PASSWORD: stylemirror
      POSTGRES_DB: stylemirror
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stylemirror"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    ports:
      - "5173:3000"
    environment:
      ORIGIN: http://localhost:5173
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
